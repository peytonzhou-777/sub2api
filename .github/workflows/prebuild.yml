name: Prebuild Test Artifacts

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '要构建的 ref、分支或 commit；留空时使用 main'
        required: false
        type: string
        default: main
      image_repository:
        description: '测试镜像仓库，不会写入 latest'
        required: false
        type: string
        default: ghcr.io/peytonzhou-777/sub2api

run-name: Prebuild ${{ inputs.ref || 'main' }}

permissions:
  contents: read
  packages: write

concurrency:
  group: prebuild-${{ github.workflow }}-${{ inputs.ref || 'main' }}
  cancel-in-progress: false

jobs:
  prebuild:
    name: Build test binaries and image
    runs-on: ubuntu-latest
    env:
      GHCR_IMAGE: ${{ inputs.image_repository || 'ghcr.io/peytonzhou-777/sub2api' }}
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Collect build metadata
        id: meta
        shell: bash
        run: |
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          COMMIT_SHA="$(git rev-parse HEAD)"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          VERSION="$(tr -d '\r\n' < backend/cmd/server/VERSION)"

          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "commit_sha=${COMMIT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "build_date=${BUILD_DATE}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${GHCR_IMAGE}:test-${SHORT_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build embedded frontend
        run: pnpm run build
        working-directory: frontend

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: go version | grep -q 'go1.26.5'

      - name: Build Linux binaries
        shell: bash
        working-directory: backend
        env:
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
          COMMIT_SHA: ${{ steps.meta.outputs.commit_sha }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        run: |
          # 先构建前端，再用 embed tag 交叉编译 Linux 测试二进制。
          for ARCH in amd64; do
            OUTPUT_DIR="${GITHUB_WORKSPACE}/dist/linux-${ARCH}"
            mkdir -p "${OUTPUT_DIR}"

            CGO_ENABLED=0 GOOS=linux GOARCH="${ARCH}" go build \
              -tags embed \
              -ldflags="-s -w -X main.Commit=${COMMIT_SHA} -X main.Date=${BUILD_DATE} -X main.BuildType=release" \
              -trimpath \
              -o "${OUTPUT_DIR}/sub2api" \
              ./cmd/server

            chmod +x "${OUTPUT_DIR}/sub2api"
            (cd "${OUTPUT_DIR}" && sha256sum sub2api > sub2api.sha256)
            cp -R resources "${OUTPUT_DIR}/resources"
            tar -C "${OUTPUT_DIR}" -czf "${GITHUB_WORKSPACE}/dist/sub2api-test-${SHORT_SHA}-linux-${ARCH}.tar.gz" sub2api sub2api.sha256 resources
          done

      - name: Upload linux amd64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: sub2api-test-${{ steps.meta.outputs.short_sha }}-linux-amd64
          path: dist/sub2api-test-${{ steps.meta.outputs.short_sha }}-linux-amd64.tar.gz
          if-no-files-found: error

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit_sha }}
            DATE=${{ steps.meta.outputs.build_date }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.commit_sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write build summary
        shell: bash
        run: |
          # 汇总测试产物，方便手动触发后直接复制部署命令。
          {
            echo "## Prebuild test artifacts"
            echo ""
            echo "- Commit: \`${{ steps.meta.outputs.commit_sha }}\`"
            echo "- Image: \`${{ steps.meta.outputs.image_tag }}\`"
            echo "- Binary artifacts:"
            echo "  - \`sub2api-test-${{ steps.meta.outputs.short_sha }}-linux-amd64\`"
          } >> "${GITHUB_STEP_SUMMARY}"
